bio: |
  I work on high energy physics with the [CMS experiment](https://cms.cern/) at CERN. I joined Prof. Maria Spiropulu’s group at Caltech in September 2024, after contributing to a CMS search for dark photons with researchers at MIT and ETH Zurich during my Master’s.

  I am interested in the intersection of HEP and machine learning, in novel detector technologies, and I have contributed to the ongoing CMS search for boosted HH → bbττ using advanced jet-tagging methods.

