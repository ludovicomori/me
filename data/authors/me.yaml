bio: |
  Hi, I am Ludovico and I work on high energy physics with the [CMS experiment](https://cms.cern/) at CERN. I joined Caltech in September 2024, after my Master's in High Energy Physics (HEP) at ETH Zurich and École Polytechnique. For my Master's thesis I contributed to a CMS search for dark photons, a potential dark matter candidate, spending time at MIT and at CERN.

  I am interested in the edge technology applications to HEP. I have contributed to the ongoing CMS search for a rare Higgs physics process, HH → bbττ in the boosted regime, which employs advanced jet-tagging methods. I have also been working on the Barrel Timing Layer upgrade of CMS Phase-2, and investigating the potential of superconducting quantum sensors for future HEP detectors.

  The site is work in progress! I will try to add stuff soon. 


