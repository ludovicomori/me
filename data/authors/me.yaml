    org: Caltech & CERN
    start: 2024-09-01
    summary: |
      Run 3 boosted HH → bbττ search; assembly of Barrel Timing Layer modules for the MIP timing detector (Phase-2 CMS upgrade) in the CPT Lab; testing superconducting nanowire single-photon detectors (SNSPD) at the LHC test beam; Offline Run Manager (ORM) shifter (2025).
